name: Release

on:
  workflow_dispatch:

jobs:
  build:
    if: github.repository == 'axone-protocol/prolog' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/build.yml

  test:
    if: github.repository == 'axone-protocol/prolog' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/test.yml

  perfom-release:
    if: github.repository == 'axone-protocol/prolog' && github.ref == 'refs/heads/main'
    needs:
      - build
      - test
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.OPS_TOKEN }}

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7
        with:
          gpg_private_key: ${{ secrets.BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BOT_GPG_PASSPHRASE }}
          git_config_global: true
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Setup node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20

      - name: Release project
        uses: cycjimmy/semantic-release-action@ba330626c4750c19d8299de843f05c7aa5574f62 # v5.0.2
        with:
          semantic_version: 22.0.5
          branch: main
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/exec@6.0.3
            @semantic-release/git
            semantic-release-replace-plugin@1.2.7
          extends: |
            conventional-changelog-conventionalcommits@7.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.OPS_TOKEN }}
          GIT_AUTHOR_NAME: ${{ vars.BOT_GIT_AUTHOR_NAME }}
          GIT_AUTHOR_EMAIL: ${{ vars.BOT_GIT_AUTHOR_EMAIL }}
          GIT_COMMITTER_NAME: ${{ vars.BOT_GIT_COMMITTER_NAME }}
          GIT_COMMITTER_EMAIL: ${{ vars.BOT_GIT_COMMITTER_EMAIL }}
